# Content Copilot API — deploy from this folder:
#   npx wrangler login          # once per machine
#   npx wrangler secret put OPENAI_API_KEY
#   npm run deploy
#
# Then set the hub meta tag to your worker URL + path /chat (or any path; worker accepts POST on any route).

name = "apac-content-hub-copilot"
main = "../../sales-ai-proxy.worker.js"
compatibility_date = "2024-11-01"

[vars]
OPENAI_MODEL = "gpt-4o"
OPENAI_TEMPERATURE = "0.55"
